# plan_handshake_v1 — plan first, implement second, via a PROPOSE/ACCEPT handshake.
#
# Tests the hypothesis: if two agents must AGREE on a disjoint file split BEFORE
# editing (a real handshake, not just declaring intent), they won't collide and
# naive git merge comes back clean. Contrast with semi_structured_v1, where agents
# declared overlapping files but nothing forced them to back off -> conflicts.
#
# The `instructions` block below is rendered into each agent's prompt as the
# cooperation workflow (editable here, no code change). The [[field]] entries are
# the enforced message structure.

name = "plan_handshake_v1"

instructions = """
Coordinate in TWO STRICT PHASES. Do NOT edit any file until Phase 1 is complete.

PHASE 1 — PLAN & HANDSHAKE (messages only, NO editing yet):
1. Immediately send a PROPOSE: `my_files` = the files YOU will own (from your
   feature), `your_files` = the files you think your PARTNER should own. Keep the
   two sets DISJOINT.
2. Run `coop-await` — it BLOCKS until your partner replies — to read their messages.
3. If their split gives you a disjoint set you can implement your feature with,
   reply ACCEPT (echo the agreed `my_files`). Otherwise reply REVISE with a better
   split and `coop-await` again. Repeat until you have RECEIVED an ACCEPT from your
   partner AND sent your own ACCEPT.
4. Only after you have received your partner's ACCEPT may you begin editing.

PHASE 2 — IMPLEMENT:
5. Edit ONLY the files in your agreed `my_files`. If you discover you genuinely must
   touch a file your partner owns, send a REVISE and re-agree BEFORE touching it.
6. Send DONE when your implementation is finished.

The whole point: agree a disjoint file split up front so your patches never collide
at merge time.
"""

[[field]]
name = "type"
required = true
enum = ["PROPOSE", "ACCEPT", "REVISE", "DONE"]
description = "handshake message type"

[[field]]
name = "my_files"
required = true
description = "comma-separated files YOU will own and edit"

[[field]]
name = "your_files"
required = false
description = "comma-separated files you propose your PARTNER owns"

[[field]]
name = "note"
required = false
description = "optional short rationale"
