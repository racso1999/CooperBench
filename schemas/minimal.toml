# minimal_v1 — the "structure floor": a single required free-text field.
# Almost identical to free-form messaging, but delivered through the structured
# path. Use it to test whether ANY imposed structure (vs. truly free chat) moves
# the needle, before attributing gains to richer schemas.

name = "minimal_v1"

[[field]]
name = "note"
required = true
description = "a short note to your peer (free text)"
