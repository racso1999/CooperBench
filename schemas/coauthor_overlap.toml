# coauthor_overlap_v1 — where two features overlap in the same code, both agents
# co-author the SAME merged version of that overlapping construct and write it
# byte-for-byte identically.
#
# Hypothesis: textual conflicts on nano are same-construct collisions — two features
# that must both edit one function (e.g. both adding a parameter to `encode()`).
# You cannot partition such a construct. But two independent patches that make a
# BYTE-IDENTICAL change to it merge cleanly (git reports "identical"). So the pair
# (1) discovers the constructs they both touch, (2) jointly co-authors the FULL
# merged version of each overlapping construct — one implementation carrying BOTH
# features' behaviour — then (3) both write that agreed text verbatim. Each agent's
# patch then independently satisfies both features in that file, and the merge is
# identical rather than conflicting.
#
# This is CO-AUTHORING the overlap, not partitioning it: both agents converge on the
# same code rather than dividing it. Contrast designated_coder_v1, where one agent
# owns the shared file and the other defers. Here neither defers — they pair-author.
# The hard part is reproducing the agreed block EXACTLY; agents exchange the full
# text in `code` and are told to COPY it verbatim, never retype or reformat it.
#
# The `instructions` block is rendered into each agent's prompt (edit freely, no
# code change). The [[field]] entries are the enforced message structure.

name = "coauthor_overlap_v1"

instructions = """
Coordinate in THREE STRICT PHASES. Do NOT edit any file until Phase 2 is agreed.

PHASE 1 — DISCOVER OVERLAPPING CONSTRUCTS (messages only, NO editing yet):
1. Immediately send a SURVEY: `files` = every file YOUR feature must edit, and in
   `note` name the specific construct(s) — function/class/import block — you must
   change (e.g. "the `encode()` method").
2. Run `coop-await` — it BLOCKS until your partner replies — to read their SURVEY.
3. Identify OVERLAPPING constructs: any function/class/block you BOTH must edit.

PHASE 2 — CO-AUTHOR THE OVERLAP (still NO editing):
4. For EACH overlapping construct, jointly write the FULL merged version of it — one
   implementation that carries BOTH features' behaviour at once (e.g. the whole
   `encode()` method with BOTH new parameters AND both new code paths). Send a DRAFT:
   `region` = which construct, `code` = the complete verbatim source of the merged
   construct.
5. `coop-await`, compare against your partner's DRAFT character-for-character. If they
   differ in ANY way (order, whitespace, types, trailing commas), send a new DRAFT
   until you converge. Then send AGREE echoing the exact `code`. You must BOTH end
   Phase 2 holding the identical agreed text for every overlapping construct.

PHASE 3 — IMPLEMENT:
6. For every overlapping construct, write the agreed `code` VERBATIM — copy it
   exactly, do not paraphrase, retype, or reformat it. Both of you write the same text.
7. For any construct only YOU touch (not overlapping), implement it normally — but it
   must not overlap your partner's non-shared constructs.
8. Send DONE when finished.

The whole point: for every construct you both edit, your patch and your partner's
patch contain the IDENTICAL merged code, so git merges them as identical rather than
conflicting — and each patch already satisfies both features there.
"""

[[field]]
name = "type"
required = true
enum = ["SURVEY", "DRAFT", "AGREE", "DONE"]
description = "coordination message type"

[[field]]
name = "files"
required = true
description = "comma-separated files this message is about"

[[field]]
name = "region"
required = false
description = "which overlapping construct this DRAFT/AGREE is about (e.g. 'encode() method')"

[[field]]
name = "code"
required = false
description = "the complete verbatim source of the merged construct — must be byte-identical to your partner's"

[[field]]
name = "note"
required = false
description = "optional short rationale or the construct name(s) involved"
