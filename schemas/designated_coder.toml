# designated_coder_v1 — for any file BOTH features need, one agent owns and
# writes the union; the other defers and hands over a spec.
#
# Hypothesis: textual conflicts on nano are same-line collisions in a function
# both features must edit (e.g. two agents both adding a parameter to the same
# `encode()` signature). You cannot split such a line by "ownership". The only
# conflict-free move for independent patches is: exactly ONE patch touches that
# file. So the pair (1) discovers which files they share, (2) assigns each shared
# file a single OWNER, (3) the non-owner sends a precise SPEC of what its feature
# needs there, and (4) the owner implements BOTH features in that file while the
# non-owner leaves it untouched. Sidesteps textual merge by construction.
#
# Trade-off recorded in the study: the deferring agent produces no patch for the
# shared file, so its pre-merge capability for that feature reads as a miss even
# when the PAIR succeeds -> report via both_passed, annotate the decomposition.
#
# The `instructions` block is rendered into each agent's prompt (edit freely,
# no code change). The [[field]] entries are the enforced message structure.

name = "designated_coder_v1"

instructions = """
Coordinate in THREE STRICT PHASES. Do NOT edit any file until Phase 2 is agreed.

PHASE 1 — DISCOVER SHARED FILES (messages only, NO editing yet):
1. Immediately send a SURVEY: `files` = every file (and, in `note`, the specific
   function(s)) YOUR feature must edit. Be exhaustive and precise.
2. Run `coop-await` — it BLOCKS until your partner replies — to read their SURVEY.
3. Intersect the two file lists. The intersection is your SHARED files; everything
   else is yours alone.

PHASE 2 — ASSIGN A SINGLE OWNER PER SHARED FILE (still NO editing):
4. For EACH shared file, agree exactly ONE owner. Send CLAIM (`files` = the shared
   file(s) you will OWN and write) or DEFER (`files` = the shared file(s) you hand
   to your partner). Every shared file must end up with exactly one owner.
5. If you DEFER a file, you MUST send a SPEC for it: `files` = that file, `spec` =
   a precise, self-contained description of exactly what YOUR feature needs done in
   it (signatures, parameters, behaviour, return values, edge cases) — enough for
   the owner to implement your feature correctly without seeing your tests.
6. `coop-await` and repeat until every shared file has one owner AND every deferred
   file has a delivered SPEC that its owner has ACKNOWLEDGED (reply CLAIM echoing it).

PHASE 3 — IMPLEMENT:
7. Edit ONLY: your own (non-shared) files, plus the shared files you OWN. In each
   file you own that is shared, implement BOTH your feature AND your partner's SPEC.
8. Do NOT touch any shared file you deferred — leave it entirely to its owner.
9. Send DONE when finished.

The whole point: every shared file is written by exactly one agent, so independent
patches never collide there; the deferring agent's needs travel as a SPEC instead
of as conflicting edits.
"""

[[field]]
name = "type"
required = true
enum = ["SURVEY", "CLAIM", "DEFER", "SPEC", "DONE"]
description = "coordination message type"

[[field]]
name = "files"
required = true
description = "comma-separated files this message is about (all files you touch, for SURVEY; the owned/deferred file, for CLAIM/DEFER/SPEC)"

[[field]]
name = "spec"
required = false
description = "when DEFERring, a precise self-contained description of what your feature needs done in that file, for the owner to implement"

[[field]]
name = "note"
required = false
description = "optional short rationale or the function name(s) involved"
