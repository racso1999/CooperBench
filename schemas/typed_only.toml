# typed_v1 — a single required message TYPE tag plus a free-text body.
# Isolates the effect of type-tagging alone (closest to the "typed protocol"
# idea): does forcing agents to label intent help, without any other structure?

name = "typed_v1"

[[field]]
name = "type"
required = true
enum = ["CLAIM", "INTENT", "QUESTION", "ANSWER", "WARN"]
description = "the kind of message"

[[field]]
name = "message"
required = true
description = "the message body (free text)"
