# ownership_first_v1 — heavy structure aimed at the dominant failure mode
# (textual merge conflicts, ~75% of pairs). Every message is an explicit
# ownership declaration over files/functions, so agents partition the code
# surface before editing instead of colliding at merge time.

name = "ownership_first_v1"

[[field]]
name = "type"
required = true
enum = ["CLAIM", "RELEASE", "QUESTION", "ANSWER", "STATUS"]
description = "CLAIM = I will own these files; RELEASE = I no longer need them; else Q/A/status"

[[field]]
name = "files"
required = true
description = "comma-separated files you are claiming/releasing (the ownership boundary)"

[[field]]
name = "functions"
required = false
description = "specific functions/classes within those files, if you want a finer boundary"

[[field]]
name = "summary"
required = true
description = "one-sentence intent for this claim"
