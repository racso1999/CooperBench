# Run CooperBench's default litellm agent (mini_swe_agent_v2) against a local
# Ollama server. The LLM call runs in the host orchestrator process, so
# localhost reaches Ollama directly (only bash actions run in the container).
#
# Usage (dev checkout — prefix with `uv run`):
#   uv run cooperbench run -n ollama-test -r pillow_task -t 25 -f 1,2 \
#     -a mini_swe_agent_v2 -m ollama_chat/qwen2.5-coder:14b \
#     --agent-config ollama.yaml --setting solo
#
# NOTE: context (num_ctx), flash attention, and KV-cache quant are set on the
# Ollama *server* (systemd drop-in), not here — see override.conf.
#
# Pick a tool-calling-capable model: the agent drives everything through a
# single `bash` tool call.
config:
  model:
    model_kwargs:
      api_base: http://localhost:11434
    # Local models have no pricing data; without this the cost calculator raises.
    cost_tracking: ignore_errors
