# Default message schema for --structured-messaging (coop mode).
#
# Edit this file (or copy it and pass the copy to --structured-messaging PATH)
# to change the STRUCTURE agents must use when they message each other, then
# compare merge-clean rate across schema variants. No code changes needed.
#
# Each [[field]] is one slot the agent fills via `coop-send --<name> <value>`.
# The container-side messaging CLI REJECTS any message that omits a required
# field or uses an out-of-enum value, so "structure was actually used" is not
# a confound. Only the coordination metadata is constrained — field *values*
# stay free text.
#
# Field keys:
#   name        (str, required)  identifier; becomes the --<name> flag
#   required    (bool, default false)
#   enum        (list[str], optional)  if present, value must be one of these
#   description (str, optional)  shown to the agent in its prompt

name = "semi_structured_v1"

[[field]]
name = "type"
required = true
enum = ["CLAIM", "INTENT", "QUESTION", "ANSWER", "STATUS"]
description = "the kind of message"

[[field]]
name = "files"
required = true
description = "comma-separated files/regions you will touch (declare early to avoid clobbering peers)"

[[field]]
name = "summary"
required = true
description = "one-sentence intent"

[[field]]
name = "blocked_on"
required = false
description = "anything you need from a peer before you can proceed"
